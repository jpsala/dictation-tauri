version: 9
policy: flow_first_lean_brief

runtime:
  daily_entry: /flow
  source: global_aos_package
  package_extension: runtime/aos-flujo.ts
  requirement: aos.requirements.json
  local_flow_copy: forbidden

flow:
  think:
    mode: current_thread
    outcome: THINK_COMPLETE_or_THINK_BLOCKED
  plan:
    mode: current_thread
    default: lightweight_implementation_brief
    content:
      - objective
      - observable_behavior
      - explicit_limits
      - 2_to_4_done_criteria
      - focused_checks
    exhaustive_only_for:
      - security
      - irreversible_migration
      - production
      - multi_repo_coordination
      - explicit_request
    outcome: PLAN_READY_or_PLAN_BLOCKED
  selection:
    source: docs_working_memory_focus
    zero: needs_planning_without_plan_preloads_plan
    one: ready_adjacent_plan_batch_auto_selects
    many: ready_adjacent_plan_batch_pairs_open_picker
    non_executable: blocked_complete_waiting_gate_use_reference
    fail_closed_on_invalid_state_fields_or_path: true
  inspection: minimum_needed_to_preserve_existing_changes
  handoff:
    mode: new_linked_session
    parent_session: preserved_as_lineage
    source: context_index_working_memory_and_selected_plan
    editor: reviewable_not_auto_sent
    transient_chat: not_implicitly_carried
    llm_summary: none
  execution:
    mode: direct_in_replacement_parent
    agent_use: explicit_user_request_only
    writer_count: 1
    max_batches: 1
    model_routing:
      source: selected_plan_frontmatter
      field: execution_route
      default: balanced
      economical: openai-codex/gpt-5.6-luna@high
      balanced: openai-codex/gpt-5.6-sol@medium
      strong: openai-codex/gpt-5.6-sol@high
      application: replacement_session_reload_before_handoff
      visibility: prompt_and_notification
      unavailable: fail_closed_without_fallback
      classifier: none
      terra: excluded_until_local_evidence
  plan_role: scope_guidance_not_exhaustive_checklist
  scope_growth: stop_instead_of_completing_adjacent_work
  checks: minimum_sufficient_nonduplicated_checks
  documentation: concise_final_state_only
  authorization: explicit_authorization_is_not_reasked
  close:
    mode: current_thread
    required_after_persisted_hacer: false
    outcome: CHECKPOINT_SAVED_or_CHECKPOINT_BLOCKED
    track: compact_only_missing_durable_value
    working_memory: minimal_state_reference_and_next_action_without_receipts

support_tools:
  orientation: [codemapper, fff]
  diagnostics: [lsp, lens]
  judgment: [advisor]
  human_decision: [ask_user]
  external_knowledge: [web, librarian]
  visible_ui: [chrome, cua]

local_gates:
  - physical_audio
  - hotkeys
  - selection
  - desktop_delivery
  - accounts
  - installs
  - commit
  - push
  - deploy
  - production

removed_engines:
  taskflow: removed
  council: removed
  planner: removed
  until_done: removed
  dgoal: removed
  governed_runner: removed
  worktree_bridge: removed

invariants:
  - prompts_are_reviewable_and_not_auto_sent
  - no_runtime_state
  - execution_route_is_explicit_reviewable_and_session_scoped
  - focused_plan_paths_stay_inside_project
  - local_reversible_work_uses_a_lightweight_brief
  - brief_is_guidance_not_an_exhaustive_checklist
  - implementation_targets_the_observable_result_in_one_pass
  - no_hardening_compatibility_rollout_or_full_matrix_without_need_or_request
  - material_scope_growth_stops_instead_of_absorbing_adjacent_work
  - minimum_sufficient_nonduplicated_checks
  - hacer_uses_a_linked_documentary_handoff
  - transient_chat_must_be_persisted_before_hacer
  - hacer_does_not_use_agent
  - durable_state_update_is_concise
  - explicit_authorization_is_not_reasked
  - no_parallel_writers
  - no_automatic_second_batch
  - project_desktop_gates_are_preserved

local_adapters:
  - /doctor
  - speckit
  - impeccable
